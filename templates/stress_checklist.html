<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopFlow Stress Checklist</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #eaf3ec; color: #163428; }
    .page { max-width: 960px; margin: 0 auto; padding: 28px; display: grid; gap: 18px; }
    .card { background: #fff; border: 1px solid #c8d9cf; border-radius: 18px; padding: 20px; box-shadow: 0 16px 40px rgba(22, 52, 40, 0.08); }
    h1, h2 { margin: 0 0 10px; }
    p { margin: 0; line-height: 1.5; }
    ul { margin: 12px 0 0; padding-left: 20px; }
    li { margin: 8px 0; }
    .checklist { display: grid; gap: 10px; margin-top: 14px; }
    label { display: flex; gap: 10px; align-items: flex-start; }
    input[type="checkbox"] { margin-top: 3px; accent-color: #0d7a53; }
    .muted { color: #5e7167; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Manual Stress Checklist</h1>
      <p class="muted">Use this page with the seeded heavy data already in the app. It is meant for quick browser-side checks that the automated backend stress script cannot verify visually.</p>
    </div>
    <div class="card">
      <h2>Inventory</h2>
      <div class="checklist">
        <label><input type="checkbox">Scroll through long category lists without layout jumps or frozen scrolling.</label>
        <label><input type="checkbox">Expand and collapse several categories quickly and make sure they stay responsive.</label>
        <label><input type="checkbox">Use search plus status, vendor, and category filters together and confirm results stay clear.</label>
        <label><input type="checkbox">Add several parts to the order list from different categories and confirm the inventory view stays stable.</label>
      </div>
    </div>
    <div class="card">
      <h2>Purchase Orders</h2>
      <div class="checklist">
        <label><input type="checkbox">Review the order list with many staged parts and confirm rows stay readable.</label>
        <label><input type="checkbox">Generate grouped orders and confirm parts are grouped by vendor, template, and warehouse.</label>
        <label><input type="checkbox">Open a multi-line PO and confirm all line items display clearly.</label>
        <label><input type="checkbox">Partially receive a PO across multiple lines and confirm outstanding quantities stay visible.</label>
      </div>
    </div>
    <div class="card">
      <h2>Jobs</h2>
      <div class="checklist">
        <label><input type="checkbox">Expand and collapse jobs with many parts and confirm there is no overlap.</label>
        <label><input type="checkbox">Pull and return parts rapidly and confirm the job stays open unless you close it yourself.</label>
        <label><input type="checkbox">Edit notes and job details, refresh, and confirm they persist.</label>
      </div>
    </div>
    <div class="card">
      <h2>Navigation</h2>
      <div class="checklist">
        <label><input type="checkbox">Switch quickly between Dashboard, Inventory, Purchase Orders, Parts Received, and Jobs.</label>
        <label><input type="checkbox">Confirm no tab unexpectedly resets data or collapses unrelated sections.</label>
        <label><input type="checkbox">Refresh the app and confirm the same data is still present.</label>
      </div>
    </div>
  </div>
</body>
</html>
